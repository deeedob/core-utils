# ---------------------------------------------------------------------------
# Built-in keymaps that align with zsh/nvim muscle memory (no override needed):
#   Z      → zoxide jump (same as `cd` in zsh via zoxide)
#   z      → fzf directory/file picker
#   S      → search files by content (ripgrep) — like <leader>fg in nvim
#   /  n N → search by name, next, prev — same as nvim
#   f      → filter files in current view
# ---------------------------------------------------------------------------

# t: open hovered directory in a new tab; fall back to CWD tab (replaces default t)
[[mgr.prepend_keymap]]
on  = ["t"]
run = "plugin smart-tab"
desc = "New tab (hovered dir or CWD)"

# F: ripgrep + fzf content search with preview (richer than built-in S)
[[mgr.prepend_keymap]]
on  = ["F"]
run = "plugin fr rg"
desc = "Find file by content (ripgrep+fzf)"

# L: open lazygit for the current repo (l enters dir, L is free)
[[mgr.prepend_keymap]]
on  = ["L"]
run = "plugin lazygit"
desc = "Open lazygit"

# C: compress selection with ouch (default C = copy — kept on c)
[[mgr.prepend_keymap]]
on  = ["C"]
run = "plugin ouch"
desc = "Compress with ouch"

# ---------------------------------------------------------------------------
# Relative motions (vim-style: 3j = down 3, 5k = up 5, 2gg = go to line 2)
# Digits are passed as the initial count to the plugin.
# ---------------------------------------------------------------------------
[[mgr.prepend_keymap]]
on = ["1"]
run = "plugin relative-motions 1"
desc = "Relative motion ×1"
[[mgr.prepend_keymap]]
on = ["2"]
run = "plugin relative-motions 2"
desc = "Relative motion ×2"
[[mgr.prepend_keymap]]
on = ["3"]
run = "plugin relative-motions 3"
desc = "Relative motion ×3"
[[mgr.prepend_keymap]]
on = ["4"]
run = "plugin relative-motions 4"
desc = "Relative motion ×4"
[[mgr.prepend_keymap]]
on = ["5"]
run = "plugin relative-motions 5"
desc = "Relative motion ×5"
[[mgr.prepend_keymap]]
on = ["6"]
run = "plugin relative-motions 6"
desc = "Relative motion ×6"
[[mgr.prepend_keymap]]
on = ["7"]
run = "plugin relative-motions 7"
desc = "Relative motion ×7"
[[mgr.prepend_keymap]]
on = ["8"]
run = "plugin relative-motions 8"
desc = "Relative motion ×8"
[[mgr.prepend_keymap]]
on = ["9"]
run = "plugin relative-motions 9"
desc = "Relative motion ×9"
